<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำร้องขอย้ายออก/ลาออกจากสถานศึกษา</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .role-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #eee;
            padding: 5px;
            border-radius: 8px;
        }
        .role-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Sarabun', sans-serif;
            transition: 0.3s;
            font-size: 14px;
        }
        .role-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #2b3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2><i class="fa-solid fa-file-invoice"></i> ระบบยื่นคำร้องออนไลน์</h2>
    
    <div class="role-selector">
        <button class="role-btn active" onclick="switchRole('student')">นักเรียน</button>
        <button class="role-btn" onclick="switchRole('registrar')">งานทะเบียน</button>
        <button class="role-btn" onclick="switchRole('director')">ผู้พิจารณา</button>
    </div>

    <div class="input-group" id="user-group" style="display: none;">
        <label id="user-label">ชื่อผู้ใช้</label>
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้">
    </div>
    
    <div class="input-group">
        <label id="pass-label">รหัสนักเรียน</label>
        <input type="password" id="password" placeholder="กรอกรหัสนักเรียน">
    </div>

    <button class="btn-submit" onclick="handleLogin()">เข้าสู่ระบบ</button>
</div>

<script type="module">
    import { db, doc, getDoc } from "./js/app.js";

    let currentRole = 'student';

    window.switchRole = function(role) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const userGroup = document.getElementById('user-group');
        const passLabel = document.getElementById('pass-label');
        const passInput = document.getElementById('password');

        if (role === 'student') {
            userGroup.style.display = 'none';
            passLabel.innerText = 'รหัสนักเรียน';
            passInput.placeholder = 'กรอกรหัสนักเรียน';
        } else {
            userGroup.style.display = 'block';
            passLabel.innerText = 'รหัสผ่าน';
            passInput.placeholder = 'กรอกรหัสผ่าน';
        }
    }

    window.handleLogin = async function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (currentRole === 'student') {
            if (!password) {
                Swal.fire('กรุณากรอกข้อมูล', 'โปรดกรอกรหัสนักเรียน', 'warning');
                return;
            }
            // จำลองการเช็คหรือเช็คกับ DB (ในอนาคตจะดึงจาก Table Student ที่ฝ่ายทะเบียนเพิ่มไว้)
            Swal.fire('สำเร็จ', 'ยินดีต้อนรับนักเรียนรหัส ' + password, 'success')
            .then(() => {
                localStorage.setItem('studentId', password);
                window.location.href = 'student.html';
            });

        } else if (currentRole === 'registrar') {
            if (username === 'T680591' && password === 'TPURP08SS') {
                Swal.fire('สำเร็จ', 'ยินดีต้อนรับเจ้าหน้าที่ฝ่ายงานทะเบียน', 'success')
                .then(() => window.location.href = 'registrar.html');
            } else {
                Swal.fire('ข้อผิดพลาด', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
            }

        } else if (currentRole === 'director') {
            if (username === 'PAURP09981' && password === 'TTPP074') {
                Swal.fire('สำเร็จ', 'ยินดีต้อนรับผู้อำนวยการโรงเรียน', 'success')
                .then(() => window.location.href = 'director.html');
            } else {
                Swal.fire('ข้อผิดพลาด', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
            }
        }
    }
</script>

</body>
</html>
