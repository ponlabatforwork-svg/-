<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มขอย้ายออก/ลาออก</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #2c3e50;
            --border-color: #cbd5e1;
            --bg-color: #f8fafc;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }
        .section-title {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-col {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .hidden {
            display: none;
        }
        .signature-container {
            border: 1px dashed var(--border-color);
            background: #fafafa;
            margin-top: 10px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 150px;
            cursor: crosshair;
        }
        .btn-clear {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e2e8f0;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #27ae60; }
        .btn-success:hover { background-color: #2ecc71; }
        
        /* Roles Switcher for Mockup */
        .role-switcher {
            text-align: center;
            margin-bottom: 20px;
        }
        .role-switcher button {
            margin: 0 5px;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary-color);
            background: transparent;
            cursor: pointer;
        }
        .role-switcher button.active {
            background: var(--primary-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="role-switcher">
        <button id="btnRoleParent" class="active" onclick="switchRole('parent')"><i class="fas fa-user"></i> ผู้ปกครอง/นักเรียน</button>
        <button id="btnRoleDirector" onclick="switchRole('director')"><i class="fas fa-user-tie"></i> ผู้อำนวยการ</button>
    </div>

    <div class="container" id="pdfContent">
        <h2><i class="fas fa-file-alt"></i> แบบคำร้องขอย้ายออก/ลาออก</h2>
        
        <form id="resignationForm">
            <div class="section-title"><i class="fas fa-user-friends"></i> ข้อมูลผู้ปกครอง</div>
            <div class="form-row">
                <div class="form-col" style="flex: 0.3;">
                    <label>คำนำหน้า</label>
                    <select id="parentPrefix" required>
                        <option value="">เลือก</option>
                        <option value="นาย">นาย</option>
                        <option value="นาง">นาง</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>ชื่อ-สกุล</label>
                    <input type="text" id="parentName" placeholder="กรอกชื่อและนามสกุล" required>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-user-graduate"></i> ข้อมูลนักเรียน</div>
            <div class="form-row">
                <div class="form-col" style="flex: 0.3;">
                    <label>คำนำหน้า</label>
                    <select id="studentPrefix" required>
                        <option value="">เลือก</option>
                        <option value="เด็กชาย">เด็กชาย</option>
                        <option value="เด็กหญิง">เด็กหญิง</option>
                        <option value="นาย">นาย</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>ชื่อ-สกุล</label>
                    <input type="text" id="studentName" placeholder="กรอกชื่อและนามสกุล" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label>ชั้นมัธยมศึกษาปีที่</label>
                    <select id="studentClass" required>
                        <option value="">เลือกชั้นปี</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>เลขประจำตัวนักเรียน</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-col">
                    <label>ปีการศึกษา</label>
                    <input type="text" id="academicYear" required>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-clipboard-check"></i> ความประสงค์</div>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="intent" value="ลาออก" required> ลาออก</label>
                    <label><input type="radio" name="intent" value="ย้ายออก"> ย้ายออก</label>
                </div>
            </div>

            <div class="form-group">
                <label>เนื่องจาก (ความจำเป็น)</label>
                <div class="radio-group" onchange="handleReasonChange()">
                    <label><input type="radio" name="reasonType" value="ไปศึกษาต่อที่" required> ไปศึกษาต่อที่</label>
                    <label><input type="radio" name="reasonType" value="ไปประกอบอาชีพ"> ไปประกอบอาชีพ</label>
                    <label><input type="radio" name="reasonType" value="อื่นๆ"> อื่นๆ</label>
                </div>
                <input type="text" id="reasonDetail" class="hidden" placeholder="โปรดระบุรายละเอียดเพิ่มเติม..." style="margin-top: 10px;">
            </div>

            <div class="section-title"><i class="fas fa-comments"></i> ความคิดเห็นครูที่ปรึกษา</div>
            <div class="form-row">
                <div class="form-col">
                    <label>ครูที่ปรึกษาคนที่ ๑</label>
                    <textarea id="advisor1Comment" rows="2" placeholder="ความคิดเห็น..."></textarea>
                </div>
                <div class="form-col">
                    <label>ครูที่ปรึกษาคนที่ ๒</label>
                    <textarea id="advisor2Comment" rows="2" placeholder="ความคิดเห็น..."></textarea>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-signature"></i> ลงชื่อผู้ปกครอง</div>
            <div class="signature-container">
                <button type="button" class="btn-clear" onclick="parentPad.clear()">ล้างลายเซ็น</button>
                <canvas id="parentSignature"></canvas>
            </div>

            <div id="directorSection" class="hidden">
                <div class="section-title"><i class="fas fa-stamp"></i> การพิจารณาของผู้อำนวยการโรงเรียน</div>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="directorDecision" value="อนุมัติ"> อนุมัติ</label>
                        <label><input type="radio" name="directorDecision" value="ไม่อนุมัติ"> ไม่อนุมัติ</label>
                    </div>
                </div>
                <label>ลงชื่อผู้อำนวยการ</label>
                <div class="signature-container">
                    <button type="button" class="btn-clear" onclick="directorPad.clear()">ล้างลายเซ็น</button>
                    <canvas id="directorSignature"></canvas>
                </div>
            </div>

            <div id="parentActions">
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> ส่งคำร้อง</button>
            </div>
            
            <div id="directorActions" class="hidden form-row" style="margin-top: 20px;">
                <button type="button" class="btn btn-success" onclick="saveDirectorDecision()"><i class="fas fa-save"></i> บันทึกการพิจารณา</button>
                <button type="button" class="btn btn-danger" onclick="downloadPDF()" id="btnDownloadPdf" disabled><i class="fas fa-file-pdf"></i> พิมพ์ PDF</button>
            </div>
        </form>
    </div>

    <script>
        // Setup Signature Pads
        const parentCanvas = document.getElementById('parentSignature');
        const directorCanvas = document.getElementById('directorSignature');
        const parentPad = new SignaturePad(parentCanvas);
        const directorPad = new SignaturePad(directorCanvas);

        // Fix canvas scaling for retina displays
        function resizeCanvas(canvas) {
            const ratio =  Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }
        window.addEventListener("resize", () => { resizeCanvas(parentCanvas); resizeCanvas(directorCanvas); });
        resizeCanvas(parentCanvas);
        resizeCanvas(directorCanvas);

        // จัดการช่องแสดงเหตุผลเพิ่มเติม
        function handleReasonChange() {
            const radios = document.getElementsByName('reasonType');
            const detailInput = document.getElementById('reasonDetail');
            detailInput.classList.remove('hidden');
            detailInput.required = true;
            
            for(let radio of radios) {
                if(radio.checked) {
                    detailInput.placeholder = `โปรดระบุรายละเอียด (${radio.value})...`;
                    break;
                }
            }
        }

        // Parent Submit
        document.getElementById('resignationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (parentPad.isEmpty()) {
                Swal.fire({ icon: 'warning', title: 'กรุณาลงลายมือชื่อ', text: 'ผู้ปกครองต้องลงลายเซ็นก่อนส่งคำร้อง', confirmButtonColor: '#2c3e50' });
                return;
            }

            // Simulate saving to database
            Swal.fire({
                title: 'ยืนยันการส่งคำร้อง?',
                text: "ข้อมูลจะถูกส่งไปยังผู้อำนวยการโรงเรียน",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#2c3e50',
                cancelButtonColor: '#e74c3c',
                confirmButtonText: 'ใช่, ส่งคำร้อง!',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({ icon: 'success', title: 'ส่งคำร้องสำเร็จ', text: 'รอการพิจารณาจากผู้อำนวยการ', confirmButtonColor: '#2c3e50' });
                    // จำลองการปลดล็อค Role
                    localStorage.setItem('formSubmitted', 'true');
                }
            });
        });

        // Director Save Decision
        function saveDirectorDecision() {
            const decision = document.querySelector('input[name="directorDecision"]:checked');
            if (!decision) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือก อนุมัติ หรือ ไม่อนุมัติ', confirmButtonColor: '#2c3e50' });
                return;
            }
            if (directorPad.isEmpty()) {
                Swal.fire({ icon: 'warning', title: 'กรุณาลงลายมือชื่อ', text: 'ผู้อำนวยการต้องลงลายเซ็น', confirmButtonColor: '#2c3e50' });
                return;
            }

            if (decision.value === 'อนุมัติ') {
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', text: 'คำร้องถูกอนุมัติ สามารถพิมพ์ PDF ได้แล้ว', confirmButtonColor: '#2c3e50' });
                document.getElementById('btnDownloadPdf').disabled = false;
            } else {
                Swal.fire({ icon: 'error', title: 'บันทึกสำเร็จ', text: 'คำร้องไม่อนุมัติ (ไม่สามารถพิมพ์ PDF ได้)', confirmButtonColor: '#2c3e50' });
                document.getElementById('btnDownloadPdf').disabled = true;
            }
        }

        // Generate PDF
        function downloadPDF() {
            // ซ่อนปุ่มต่างๆ ก่อนพิมพ์
            const elementsToHide = document.querySelectorAll('.btn, .btn-clear, .role-switcher');
            elementsToHide.forEach(el => el.style.display = 'none');

            const element = document.getElementById('pdfContent');
            const opt = {
                margin:       10,
                filename:     'แบบฟอร์มขอย้ายออก.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // สร้าง PDF
            html2pdf().set(opt).from(element).save().then(() => {
                // คืนค่าการแสดงผลปุ่ม
                elementsToHide.forEach(el => el.style.display = '');
            });
        }

        // Mockup Role Switcher Logic
        function switchRole(role) {
            document.getElementById('btnRoleParent').classList.remove('active');
            document.getElementById('btnRoleDirector').classList.remove('active');

            if (role === 'parent') {
                document.getElementById('btnRoleParent').classList.add('active');
                document.getElementById('directorSection').classList.add('hidden');
                document.getElementById('directorActions').classList.add('hidden');
                document.getElementById('parentActions').classList.remove('hidden');
            } else {
                document.getElementById('btnRoleDirector').classList.add('active');
                document.getElementById('directorSection').classList.remove('hidden');
                document.getElementById('directorActions').classList.remove('hidden');
                document.getElementById('parentActions').classList.add('hidden');
                resizeCanvas(directorCanvas); // Resize when unhidden
            }
        }
    </script>
</body>
</html>
