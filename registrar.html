<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบงานทะเบียน - จัดการคำร้องและข้อมูล</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .nav-tabs { display: flex; gap: 10px; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-family: 'Sarabun', sans-serif; font-size: 16px; transition: 0.2s; }
        .tab-btn.active { background: #2b3e50; color: white; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2b3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: #2b3e50; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-warning { background: #f57c00; color: white; }
        .btn-info { background: #0288d1; color: white; }
        .btn:hover { opacity: 0.9; }
        
        .signature-area { border: 2px dashed #ccc; background: #fafafa; border-radius: 6px; height: 150px; position: relative; }
        canvas { width: 100%; height: 100%; }
        .action-flex { display: flex; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-user-gear"></i> แผงควบคุมเจ้าหน้าที่ฝ่ายทะเบียน</h2>
    
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('requests-tab')">รายการคำร้องขอย้าย/ลาออก</button>
        <button class="tab-btn" onclick="switchTab('manage-tab')">จัดการนักเรียน & เจ้าหน้าที่</button>
        <button class="tab-btn" onclick="switchTab('create-tab')">เพิ่มคำร้องแทน</button>
    </div>

    <div id="requests-tab" class="tab-content active">
        <h3><i class="fa-solid fa-list-check"></i> รายการคำร้องขอย้ายออกและลาออกจากสถานศึกษา</h3>
        <table>
            <thead>
                <tr>
                    <th>รหัสนักเรียน</th>
                    <th>ชื่อ-สกุล นักเรียน</th>
                    <th>ความประสงค์</th>
                    <th>สถานะปัจจุบัน</th>
                    <th>การจัดการสถานะ</th>
                    <th>เอกสารราชการ</th>
                </tr>
            </thead>
            <tbody id="request-list-body">
                </tbody>
        </table>
    </div>

    <div id="manage-tab" class="tab-content">
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <h3><i class="fa-solid fa-user-plus"></i> เพิ่มรายชื่อนักเรียนเข้าฐานข้อมูล</h3>
                <form id="add-student-form" onsubmit="addStudent(event)">
                    <div class="form-group">
                        <label>คำนำหน้า</label>
                        <select id="reg-std-title" required>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ชื่อ-สกุล</label>
                        <input type="text" id="reg-std-name" placeholder="กรอกชื่อและนามสกุลนักเรียน" required>
                    </div>
                    <div class="form-group">
                        <label>รหัสนักเรียน</label>
                        <input type="text" id="reg-std-id" placeholder="กรอกเลขประจำตัวนักเรียน" required>
                    </div>
                    <div class="form-group">
                        <label>ชั้นมัธยมศึกษาปีที่</label>
                        <input type="text" id="reg-std-grade" placeholder="เช่น 3/1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">บันทึกข้อมูลนักเรียน</button>
                </form>
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h3><i class="fa-solid fa-user-shield"></i> เพิ่มผู้ใช้งานฝ่ายทะเบียน</h3>
                <form id="add-registrar-form" onsubmit="addRegistrar(event)">
                    <div class="form-group">
                        <label>ชื่อ-สกุล เจ้าหน้าที่</label>
                        <input type="text" id="reg-user-name" placeholder="กรอกชื่อ-สกุลจริงเจ้าหน้าที่" required>
                    </div>
                    <div class="form-group">
                        <label>ชื่อผู้ใช้ (Username)</label>
                        <input type="text" id="reg-user-uname" placeholder="สำหรับใช้ Login ขึ้นต้นด้วย T" required>
                    </div>
                    <div class="form-group">
                        <label>รหัสผ่าน</label>
                        <input type="password" id="reg-user-pass" placeholder="กำหนดรหัสผ่านเข้าใช้งาน" required>
                    </div>
                    <button type="submit" class="btn btn-primary">สร้างบัญชีเจ้าหน้าที่</button>
                </form>
            </div>
        </div>
    </div>

    <div id="create-tab" class="tab-content">
        <h3><i class="fa-solid fa-file-pen"></i> เขียนคำร้องขอย้ายออก/ลาออก (เจ้าหน้าที่กรอกข้อมูลแทน)</h3>
        <form id="registrar-create-form" onsubmit="createRequestByStaff(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>รหัสนักเรียน</label><input type="text" id="rep-std-id" required></div>
                <div class="form-group">
                    <label>คำนำหน้าผู้ปกครอง</label>
                    <select id="rep-parent-title" required>
                        <option value="นาย">นาย</option>
                        <option value="นาง">นาง</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>ชื่อ-สกุล ผู้ปกครอง</label><input type="text" id="rep-parent-name" placeholder="ระบุชื่อ-สกุลจริงผู้ปกครอง" required></div>
            
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px;">
                <div class="form-group">
                    <label>คำนำหน้านักเรียน</label>
                    <select id="rep-std-title" required>
                        <option value="เด็กชาย">เด็กชาย</option>
                        <option value="เด็กหญิง">เด็กหญิง</option>
                        <option value="นาย">นาย</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="form-group"><label>ชื่อ-สกุล นักเรียน</label><input type="text" id="rep-std-name" placeholder="ระบุชื่อ-สกุลจริงนักเรียน" required></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>ชั้นมัธยมศึกษาปีที่</label><input type="text" id="rep-std-grade" placeholder="เช่น 3/1" required></div>
                <div class="form-group"><label>ปีการศึกษา</label><input type="text" id="rep-year" placeholder="เช่น 2026" required></div>
            </div>
            
            <div class="form-group">
                <label>ความประสงค์</label>
                <input type="radio" name="rep-intent" value="ลาออก" checked> ลาออก &nbsp;&nbsp;&nbsp;
                <input type="radio" name="rep-intent" value="ย้ายออก"> ย้ายออก
            </div>
            <div class="form-group">
                <label>ความจำเป็น / สาเหตุเหตุผลการยื่นคำร้อง</label>
                <input type="text" id="rep-reason" placeholder="ระบุรายละเอียดความจำเป็น เช่น ไปศึกษาต่อต่างจังหวัด..." required>
            </div>
            <div class="form-group">
                <label>ลงชื่อเจ้าหน้าที่ทะเบียนผู้รับเรื่อง (ลายเซ็นอิเล็กทรอนิกส์)</label>
                <div class="signature-area"><canvas id="registrar-sig-pad"></canvas></div>
                <button type="button" class="btn btn-secondary" onclick="clearRegSig()" style="margin-top:5px; padding:5px 10px; font-size:13px;">ล้างลายเซ็น</button>
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 15px; padding: 12px;"><i class="fa-solid fa-paper-plane"></i> บันทึกข้อมูลและส่งต่อไปยังผู้พิจารณา (ผอ.)</button>
        </form>
    </div>
</div>

<script type="module">
    import { db, collection, setDoc, doc, onSnapshot, updateDoc } from "./js/app.js";

    // ตรวจสอบความปลอดภัยเบื้องต้นของสิทธิ์เจ้าหน้าที่
    const currentStaffUser = localStorage.getItem('registrarUsername') || 'เจ้าหน้าที่ฝ่ายทะเบียน';

    // จัดการระบบแท็บสลับเมนู
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        if(tabId === 'create-tab') { resizeCanvas(); }
    }

    // จัดการ Signature Pad สำหรับเจ้าหน้าที่งานทะเบียน
    const canvas = document.getElementById('registrar-sig-pad');
    const sigPad = new SignaturePad(canvas);
    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        sigPad.clear();
    }
    window.clearRegSig = () => sigPad.clear();

    // 1. ดึงข้อมูลรายการคำร้องขอย้าย/ลาออกจากฐานข้อมูลแบบเรียลไทม์
    onSnapshot(collection(db, "requests"), (snapshot) => {
        const tbody = document.getElementById('request-list-body');
        tbody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const req = docSnap.data();
            const id = docSnap.id;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${req.studentId}</td>
                <td>${req.studentTitle || ''}${req.studentName}</td>
                <td><strong style="color:${req.intent === 'ลาออก' ? '#c62828':'#0288d1'}">${req.intent}</strong></td>
                <td><span class="btn btn-info" style="cursor:default; padding:3px 8px; font-size:12px; font-weight:normal;">${req.status}</span></td>
                <td>
                    <div class="action-flex">
                        <button class="btn btn-warning" onclick="updateStatus('${id}', 'ฝ่ายทะเบียนรับเรื่องแล้ว')">รับเรื่อง</button>
                        <button class="btn btn-primary" onclick="updateStatus('${id}', 'ฝ่ายทะเบียนกำลังตรวจสอบ')">กำลังตรวจ</button>
                        <button class="btn btn-danger" onclick="rejectRequest('${id}')">ตีกลับผู้ส่ง</button>
                        <button class="btn btn-success" onclick="updateStatus('${id}', 'คำขอถูกส่งไปยังผู้พิจารณาแล้ว')">ส่งต่อ ผอ.</button>
                    </div>
                </td>
                <td>
                    <button class="btn btn-primary" onclick="printDoc('${id}')"><i class="fa-solid fa-print"></i> พิมพ์ PDF</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });

    // ฟังก์ชันเปลี่ยนสถานะในบันทึกบันทึกหลัก
    window.updateStatus = async function(id, newStatus) {
        try {
            await updateDoc(doc(db, "requests", id), { 
                status: newStatus, 
                isRejected: false,
                rejectedTo: ""
            });
            Swal.fire('อัปเดตเรียบร้อย', `ปรับเปลี่ยนสถานะเป็น: ${newStatus}`, 'success');
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
    }

    // ฟังก์ชันส่งเอกสารคืนกลับให้นักเรียนแก้ไขข้อมูลใหม่กรณีตรวจเจอจุดผิดพลาด
    window.rejectRequest = async function(id) {
        const { value: reason } = await Swal.fire({
            title: 'ระบุสาเหตุการตีกลับคำขอให้ผู้ส่ง',
            input: 'text',
            inputPlaceholder: 'ข้อมูลผิดพลาดตรงไหน โปรดระบุหมายเหตุเพื่อแก้ไข...',
            showCancelButton: true,
            confirmButtonText: 'ยืนยันการตีกลับ',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#c62828',
            inputValidator: (value) => { if (!value) { return 'จำเป็นต้องใส่สาเหตุหรือจุดแก้ไข!' } }
        });

        if (reason) {
            try {
                await updateDoc(doc(db, "requests", id), {
                    status: "ฝ่ายทะเบียนกำลังตรวจสอบ",
                    isRejected: true,
                    rejectedTo: "student", // ระบุสิทธิ์ชี้เป้าตีกลับไปที่ตัวนักเรียน
                    rejectReason: reason
                });
                Swal.fire('สำเร็จ', 'ตีกลับคำขอไปยังหน้าจอนักเรียนเรียบร้อยแล้ว', 'success');
            } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
        }
    }

    // 2. บันทึกข้อมูลเพิ่มรายชื่อนักเรียนพื้นฐานเข้าสู่คอลเลกชันฐานข้อมูลหลัก
    window.addStudent = async function(e) {
        e.preventDefault();
        const studentId = document.getElementById('reg-std-id').value;
        const title = document.getElementById('reg-std-title').value;
        const name = document.getElementById('reg-std-name').value;
        const grade = document.getElementById('reg-std-grade').value;

        try {
            await setDoc(doc(db, "students", studentId), { studentId, title, name, grade });
            Swal.fire('สำเร็จ', 'บันทึกรายชื่อนักเรียนเข้าระบบเรียบร้อยแล้ว', 'success');
            document.getElementById('add-student-form').reset();
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
    }

    // 3. สร้างบัญชีรายชื่อเพื่อนร่วมแผนกเจ้าหน้าที่ฝ่ายทะเบียนรายบุคคล
    window.addRegistrar = async function(e) {
        e.preventDefault();
        const name = document.getElementById('reg-user-name').value;
        const username = document.getElementById('reg-user-uname').value;
        const password = document.getElementById('reg-user-pass').value;

        try {
            await setDoc(doc(db, "users", username), { name, username, password, role: 'registrar' });
            Swal.fire('สำเร็จ', 'สร้างสิทธิ์ไอดีพนักงานเรียบร้อยแล้ว', 'success');
            document.getElementById('add-registrar-form').reset();
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
    }

    // 4. บันทึกและออกคำร้องแทนกรณีเกิดความจำเป็นฉุกเฉิน
    window.createRequestByStaff = async function(e) {
        e.preventDefault();
        if(sigPad.isEmpty()){ 
            Swal.fire('คำเตือน', 'กรุณาเซ็นชื่อรับรองการกรอกเอกสารแทนของเจ้าหน้าที่', 'warning'); 
            return; 
        }
        
        const studentId = document.getElementById('rep-std-id').value;
        const parentTitle = document.getElementById('rep-parent-title').value;
        const parentName = document.getElementById('rep-parent-name').value;
        const studentTitle = document.getElementById('rep-std-title').value;
        const studentName = document.getElementById('rep-std-name').value;
        const studentGrade = document.getElementById('rep-std-grade').value;
        const academicYear = document.getElementById('rep-year').value;
        const intent = document.querySelector('input[name="rep-intent"]:checked').value;
        const reasonDetail = document.getElementById('rep-reason').value;
        const regSig = sigPad.toDataURL();

        try {
            await setDoc(doc(db, "requests", studentId), {
                studentId, parentTitle, parentName, studentTitle, studentName,
                studentGrade, academicYear, intent, reasonType: "อื่นๆ", reasonDetail, 
                parentSignature: "", 
                registrarSignature: regSig,
                status: "คำขอถูกส่งไปยังผู้พิจารณาแล้ว", 
                isRejected: false, 
                rejectedTo: "",
                directorApproval: "pending",
                timestamp: new Date()
            });
            Swal.fire('สำเร็จ', 'บันทึกสร้างฟอร์มแทน และยื่นคำขอส่งต่อถึง ผอ. แล้ว', 'success');
            document.getElementById('registrar-create-form').reset();
            sigPad.clear();
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
    }

    // ฟังก์ชันสั่งพิมพ์ข้อมูลหน้า PDF สารบรรณข้าราชการ
    window.printDoc = function(id) {
        localStorage.setItem('print_target_id', id);
        localStorage.setItem('pdf_printer_name', currentStaffUser); // ชื่อคนสั่งพิมพ์ประทับตราท้ายกระดาษ
        window.open('student.html', '_blank'); 
        // เนื่องจากฝั่งโค้ดพิมพ์งานทางราชการทั้งหมดเราได้จัดวางครอบผ่าน @media print ไว้ในตัวนักเรียน (student.html) เรียบร้อยแล้วครับ
    }
</script>
</body>
</html>
