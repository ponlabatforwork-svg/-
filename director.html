<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบผู้พิจารณา - ผู้อำนวยการโรงเรียน</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .nav-tabs { display: flex; gap: 10px; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-family: 'Sarabun', sans-serif; font-size: 16px; }
        .tab-btn.active { background: #2b3e50; color: white; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2b3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-warning { background: #f57c00; color: white; }
        .btn-primary { background: #2b3e50; color: white; }
        .btn-info { background: #0288d1; color: white; }
        
        .signature-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 6px; width: 300px; height: 150px; margin-top: 10px; }
        canvas { width: 100%; height: 100%; }
        .flex-buttons { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-user-tie"></i> ระบบงานพิจารณาสำหรับผู้อำนวยการ</h2>
    
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('review-tab')">คำร้องที่รอดำเนินการ</button>
        <button class="tab-btn" onclick="switchTab('settings-tab')">ตั้งค่าระบบ</button>
    </div>

    <div id="review-tab" class="tab-content active">
        <h3><i class="fa-solid fa-folder-open"></i> รายการคำร้องส่งถึงคุณ</h3>
        <table>
            <thead>
                <tr>
                    <th>นักเรียน</th>
                    <th>ความประสงค์</th>
                    <th>เหตุผล</th>
                    <th>สถานะปัจจุบัน</th>
                    <th>การพิจารณา</th>
                </tr>
            </thead>
            <tbody id="director-list-body">
                </tbody>
        </table>
    </div>

    <div id="settings-tab" class="tab-content">
        <h3><i class="fa-solid fa-gear"></i> ตั้งค่าข้อมูลสถานศึกษา (สำหรับแสดงบน PDF)</h3>
        <form id="settings-form" onsubmit="saveSettings(event)">
            <div class="form-group">
                <label>ชื่อโรงเรียน</label>
                <input type="text" id="set-school-name" required>
            </div>
            <div class="form-group">
                <label>ชื่อ-สกุล เจ้าหน้าที่ฝ่ายทะเบียน</label>
                <input type="text" id="set-registrar-name" required>
            </div>
            <div class="form-group">
                <label>ชื่อ-สกุล ผู้อำนวยการโรงเรียน</label>
                <input type="text" id="set-director-name" required>
            </div>
            <button type="submit" class="btn btn-primary">บันทึกการตั้งค่า</button>
        </form>
    </div>
</div>

<div id="sig-modal" style="display:none;">
    <p>ลงนามผู้อำนวยการโรงเรียน</p>
    <div class="signature-container"><canvas id="director-sig-pad"></canvas></div>
    <button class="btn btn-warning" onclick="clearDirSig()" style="margin-top:5px;">ล้าง</button>
</div>

<script type="module">
    import { db, collection, doc, onSnapshot, updateDoc, getDoc, setDoc } from "./js/app.js";

    let currentActiveId = "";
    let dirSigPad;

    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // ดึงข้อมูลคำร้องเฉพาะที่ส่งถึง ผอ.
    onSnapshot(collection(db, "requests"), (snapshot) => {
        const tbody = document.getElementById('director-list-body');
        tbody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const req = docSnap.data();
            const id = docSnap.id;
            
            // แสดงเฉพาะคำร้องที่ฝ่ายทะเบียนส่งมาแล้ว หรือ ผอ. กำลังตรวจ
            if(req.status.includes("ผู้พิจารณา") || req.status === "คำขอถูกส่งไปยังผู้พิจารณาแล้ว") {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${req.studentTitle}${req.studentName} (ม.${req.studentGrade})</td>
                    <td><b style="color:red">${req.intent}</b></td>
                    <td>${req.reasonType} ${req.reasonDetail || ''}</td>
                    <td><span class="btn btn-info">${req.status}</span></td>
                    <td>
                        <div class="flex-buttons">
                            <button class="btn btn-warning" onclick="updateDirStatus('${id}', 'ผู้พิจารณารับเรื่องแล้ว')">รับเรื่อง</button>
                            <button class="btn btn-primary" onclick="updateDirStatus('${id}', 'ผู้พิจารณากำลังตรวจสอบ')">กำลังตรวจ</button>
                            <button class="btn btn-danger" onclick="directorReject('${id}')">ตีกลับ</button>
                            <button class="btn btn-success" onclick="openSignatureModal('${id}', 'approved')">อนุมัติ</button>
                            <button class="btn btn-danger" style="background:#555" onclick="openSignatureModal('${id}', 'disapproved')">ไม่อนุมัติ</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    });

    window.updateDirStatus = async function(id, newStatus) {
        await updateDoc(doc(db, "requests", id), { status: newStatus });
        Swal.fire('สำเร็จ', 'อัปเดตสถานะการตรวจสอบแล้ว', 'success');
    }

    // ระบบตีกลับแบบเลือกปลายทางได้ (ทะเบียน หรือ นักเรียน)
    window.directorReject = async function(id) {
        const { value: formValues } = await Swal.fire({
            title: 'ระบุรายละเอียดการตีกลับ',
            html: `
                <div style="text-align:left; margin-bottom:10px;">
                    <label><b>ส่งกลับไปยัง:</b></label><br>
                    <input type="radio" name="back-to" value="registrar" checked> ฝ่ายทะเบียน <br>
                    <input type="radio" name="back-to" value="student"> ผู้ส่งคำขอ (นักเรียน/ผู้ปกครอง)
                </div>
                <input id="swal-input-reason" class="swal2-input" placeholder="ระบุหมายเหตุ/สาเหตุการตีกลับ" style="margin:0; width:90%;">
            `,
            focusConfirm: false,
            preConfirm: () => {
                return {
                    target: document.querySelector('input[name="back-to"]:checked').value,
                    reason: document.getElementById('swal-input-reason').value
                }
            }
        });

        if (formValues) {
            if(!formValues.reason) { Swal.fire('แจ้งเตือน', 'กรุณาระบุหมายเหตุการตีกลับ', 'warning'); return; }
            
            let finalStatus = formValues.target === 'registrar' ? "ฝ่ายทะเบียนกำลังตรวจสอบ" : "ฝ่ายทะเบียนกำลังตรวจสอบ (ตีกลับแก้ไข)";
            await updateDoc(doc(db, "requests", id), {
                status: finalStatus,
                isRejected: true,
                rejectReason: `(ผอ. ตีกลับ) ${formValues.reason}`
            });
            Swal.fire('สำเร็จ', 'ตีกลับคำร้องเรียบร้อยแล้ว', 'success');
        }
    }

    // เปิดหน้าต่างเซ็นชื่อเมื่อกด อนุมัติ/ไม่อนุมัติ
    window.openSignatureModal = function(id, decision) {
        currentActiveId = id;
        Swal.fire({
            title: decision === 'approved' ? 'ยืนยันการอนุมัติ' : 'ยืนยันไม่อนุมัติ',
            html: document.getElementById('sig-modal').innerHTML,
            showCancelButton: true,
            confirmButtonText: 'บันทึกผลการพิจารณา',
            cancelButtonText: 'ยกเลิก',
            didOpen: () => {
                const canvas = document.querySelector('.swal2-container canvas');
                dirSigPad = new SignaturePad(canvas);
            },
            preConfirm: () => {
                if(dirSigPad.isEmpty()) { Swal.showValidationMessage('กรุณาลงลายเซ็นก่อนยืนยันครับ'); return false; }
                return dirSigPad.toDataURL();
            }
        }).then(async (result) => {
            if (result.isConfirmed) {
                await updateDoc(doc(db, "requests", currentActiveId), {
                    status: "เสร็จสิ้น", // ขั้นตอนสุดท้ายแสดงคำว่า "เสร็จสิ้น" เสมอ
                    directorApproval: decision,
                    directorSignature: result.value,
                    actionDate: new Date()
                });
                Swal.fire('บันทึกสำเร็จ', 'ดําเนินการเสร็จสิ้นเรียบร้อย', 'success');
            }
        });
    }

    // โหลดและบันทึกการตั้งค่าระบบ
    async function loadSettings() {
        const docSnap = await getDoc(doc(db, "settings", "global"));
        if(docSnap.exists()) {
            const d = docSnap.data();
            document.getElementById('set-school-name').value = d.schoolName || '';
            document.getElementById('set-registrar-name').value = d.registrarName || '';
            document.getElementById('set-director-name').value = d.directorName || '';
        }
    }
    loadSettings();

    window.saveSettings = async function(e) {
        e.preventDefault();
        await setDoc(doc(db, "settings", "global"), {
            schoolName: document.getElementById('set-school-name').value,
            registrarName: document.getElementById('set-registrar-name').value,
            directorName: document.getElementById('set-director-name').value
        });
        Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าโครงสร้างโรงเรียนแล้ว', 'success');
    }
</script>
</body>
</html>
